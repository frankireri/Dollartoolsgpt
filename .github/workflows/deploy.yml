name: Deploy Next.js to Virtualmin

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            set -e
            git config --global --add safe.directory /home/dollartoolsgpt/public_html || true
            cd /home/dollartoolsgpt/public_html
            
            # Fetch and reset
            git fetch --all
            git reset --hard origin/main
            
            # Create .env file from secret
            echo "${{ secrets.ENV_CONTENTS }}" > .env
            
            # Install dependencies and build
            npm ci || npm install
            rm -rf .next
            NEXT_TELEMETRY_DISABLED=1 npm run build
            
            # Fix permissions aggressively
            SITE_USER=$(stat -c '%U' .)
            chown -R $SITE_USER:$SITE_USER .
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            
            # Restart the app
            pm2 delete dollartools || true
            pm2 start npm --name "dollartools" -- start -- -p 3012
            pm2 save
