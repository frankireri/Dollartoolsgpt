name: Deploy Next.js to Virtualmin

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            set -e
            git config --global --add safe.directory /home/dollartoolsgpt/public_html || true
            cd /home/dollartoolsgpt/public_html
            
            # Fetch and reset
            git fetch --all
            git reset --hard origin/main
            
            # Create .env file from secret
            echo "${{ secrets.ENV_CONTENTS }}" > .env
            
            # Install dependencies and build
            # Using npm install instead of ci to handle minor lockfile mismatches on server environment
            npm install --no-audit --no-fund
            rm -rf .next
            NEXT_TELEMETRY_DISABLED=1 npm run build
            
            # Fix permissions aggressively (Run as root via SSH)
            # We must ensure the web user (often same as account name) owns everything
            SITE_USER=$(stat -c '%U' .)
            echo "Directoy owner is: $SITE_USER"
            
            chown -R $SITE_USER:$SITE_USER .
            chmod -R 755 .
            # But files should be 644
            find . -type f -exec chmod 644 {} \;
            # Executables in node_modules and .next need to stay executable
            find .next -type f -name "*.js" -exec chmod 755 {} \; 2>/dev/null || true
            
            # Restart the app
            pm2 delete dollartools || true
            pm2 start npm --name "dollartools" -- start -- -p 3012
            pm2 save
            
            echo "Deployment finished successfully."
            ls -la . | head -n 20
