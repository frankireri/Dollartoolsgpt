name: Deploy Next.js to Virtualmin

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/dollartoolsgpt/public_html
            # Ensure git is initialized and remote is set correctly
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/frankireri/Dollartoolsgpt.git
            fi
            git fetch --all
            git reset --hard origin/main
            
            # Create .env file from secret
            echo "${{ secrets.ENV_CONTENTS }}" > .env
            
            # Install dependencies and build
            npm ci || npm install
            rm -rf .next
            npm run build
            
            # Fix permissions (ensure files are readable by web server)
            # Find the actual owner of the public_html directory and apply it
            SITE_USER=$(stat -c '%U' .)
            chown -R $SITE_USER:$SITE_USER .
            
            # Restart the app (Assuming PM2 is used)
            pm2 delete dollartools || true
            pm2 start npm --name "dollartools" -- start -- -p 3012
            pm2 save
