name: Deploy Next.js to Virtualmin

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 163.245.208.33
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            set -e
            git config --global --add safe.directory /home/dollartoolsgpt/public_html || true
            cd /home/dollartoolsgpt/public_html
            
            # Fetch and reset (gets the optimized zip)
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            
            # Verify zip presence and size
            echo "--- SERVER FILE CHECK ---"
            ls -lh dollartools-deploy-v2.zip || echo "ERROR: Zip file not found!"
            
            # Clean slate (Delete everything EXCEPT the zip)
            echo "Cleaning public_html for a fresh start..."
            find . -maxdepth 1 ! -name 'dollartools-deploy-v2.zip' ! -name '.' -exec rm -rf {} +
            
            # Extract the optimized bundle (QUIETLY)
            echo "Extracting deployment bundle quietly..."
            unzip -oq dollartools-deploy-v2.zip -d .
            
            # Create .env file from secret
            echo "${{ secrets.ENV_CONTENTS }}" > .env
            
            # Fix permissions (SMART CHOWN)
            SITE_USER="dollartoolsgpt"
            echo "Syncing permissions for $SITE_USER..."
            # Try to fix ownership - if we're not root, we can only chown our own files anyway
            chown -R $SITE_USER:$SITE_USER . 2>/dev/null || echo "Ownership change skipped (permission denied or unnecessary)."
            
            # Standard web permissions (Aggressive for static assets)
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            chmod +x node_modules/.bin/* 2>/dev/null || true
            chmod +x server.js
            
            # Restart as the site user
            echo "Restarting application via PM2..."
            pm2 delete dollartools || true
            pm2 start server.js --name "dollartools" -- -p 3012
            pm2 save
            
            # FINAL HEALTH CHECK
            echo "--- HEALTH CHECK ---"
            pm2 list
            # Verify a random static file is readable
            STATIC_FILE=$(find .next/static -name "*.css" | head -n 1)
            if [ -n "$STATIC_FILE" ]; then
                echo "Testing readability of $STATIC_FILE..."
                cat "$STATIC_FILE" > /dev/null && echo "Result: Static asset is READABLE." || echo "Result: ERROR - Static asset is NOT READABLE."
            fi
            
            echo "Deployment finished."
