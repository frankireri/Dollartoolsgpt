name: Deploy Next.js to Virtualmin

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            set -e
            git config --global --add safe.directory /home/dollartoolsgpt/public_html || true
            cd /home/dollartoolsgpt/public_html
            
            # Fetch and reset (gets the optimized zip)
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            
            # Extract the optimized bundle
            echo "Extracting deployment bundle..."
            unzip -o dollartools-deploy-v2.zip -d .
            
            # Create .env file from secret
            echo "${{ secrets.ENV_CONTENTS }}" > .env
            
            # Fix permissions (ENFORCE SITE USER WITH SUDO)
            SITE_USER="dollartoolsgpt"
            echo "Current user is: $(whoami)"
            echo "Enforcing ownership for $SITE_USER..."
            sudo chown -R $SITE_USER:$SITE_USER . || echo "WARNING: sudo chown failed, trying without sudo..." && chown -R $SITE_USER:$SITE_USER . || true
            
            # Aggressive permissions for static assets
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            chmod +x node_modules/.bin/* 2>/dev/null || true
            chmod +x server.js
            
            # Restart
            pm2 delete dollartools || true
            sudo -u $SITE_USER pm2 start server.js --name "dollartools" -- -p 3012
            pm2 save
            
            # DIAGNOSTICS & PERMISSION VERIFICATION
            echo "--- VERIFYING PERMISSIONS ---"
            ls -la .next/static | head -n 10
            
            echo "--- TESTING LOCAL ASSET FETCH ---"
            # Try to fetch one of the assets locally to see if it's a proxy issue
            STATIC_FILE=$(find .next/static -name "*.css" | head -n 1)
            if [ -z "$STATIC_FILE" ]; then
              echo "ERROR: No static CSS files found!"
            else
              echo "Testing local access to $STATIC_FILE..."
              # Check if the file is truly readable by a non-root user
              sudo -u $SITE_USER cat "$STATIC_FILE" > /dev/null && echo "Success: File is readable by $SITE_USER" || echo "FAILURE: File is NOT readable by $SITE_USER"
            fi
            
            echo "--- PM2 STATUS ---"
            pm2 status
            
            echo "Deployment finished and diagnostics logged."
